version: '3.8'

# ──────────────────────────────────────────────────────────────────────────────
# 프로덕션 Docker Compose 설정
#
# 로컬 개발(docker-compose.yml)과의 차이:
#   - 백엔드 / 프론트엔드 컨테이너 포함
#   - Nginx 리버스 프록시 포함
#   - 외부 RDS / ElastiCache 사용 시 postgres/redis 서비스 제거
#   - 모든 민감 정보는 .env 파일 또는 환경 변수로 주입
#
# 실행 방법:
#   docker-compose -f docker-compose.prod.yml up -d
# ──────────────────────────────────────────────────────────────────────────────

services:

  # ── 백엔드 (Spring Boot) ────────────────────────────────────────────────────
  backend:
    image: ${ECR_REGISTRY}/bidbid-backend:${IMAGE_TAG:-latest}
    container_name: auction-backend
    restart: always
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_URL:          ${DB_URL}
      DB_USERNAME:     ${DB_USERNAME}
      DB_PASSWORD:     ${DB_PASSWORD}
      REDIS_HOST:      ${REDIS_HOST}
      REDIS_PORT:      ${REDIS_PORT:-6379}
      JWT_SECRET:      ${JWT_SECRET}
      S3_BUCKET:       ${S3_BUCKET}
      AWS_ACCESS_KEY:  ${AWS_ACCESS_KEY}
      AWS_SECRET_KEY:  ${AWS_SECRET_KEY}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
    expose:
      - "8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health | grep UP || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - auction-network

  # ── 프론트엔드 (Next.js) ────────────────────────────────────────────────────
  frontend:
    image: ${ECR_REGISTRY}/bidbid-frontend:${IMAGE_TAG:-latest}
    container_name: auction-frontend
    restart: always
    environment:
      NEXT_PUBLIC_API_URL:  ${NEXT_PUBLIC_API_URL:-https://api.your-domain.com}
      NEXT_PUBLIC_WS_URL:   ${NEXT_PUBLIC_WS_URL:-wss://api.your-domain.com}
    expose:
      - "3000"
    depends_on:
      - backend
    networks:
      - auction-network

  # ── Nginx (리버스 프록시 + SSL) ─────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: auction-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro    # SSL 인증서 (Certbot 발급)
      - /var/www/certbot:/var/www/certbot:ro     # ACME 챌린지용
    depends_on:
      - backend
      - frontend
    networks:
      - auction-network

  # ── PostgreSQL (RDS 미사용 시만 포함) ──────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: auction-postgres
    restart: always
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-auction}
      POSTGRES_USER:     ${POSTGRES_USER:-auction}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-auction}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - auction-network

  # ── Redis (ElastiCache 미사용 시만 포함) ────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: auction-redis
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD:-}
    volumes:
      - redis-data:/data
    expose:
      - "6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - auction-network

  # ── Prometheus (메트릭 수집) ────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: auction-prometheus
    restart: always
    volumes:
      - ./monitoring/prometheus.prod.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
    expose:
      - "9090"
    networks:
      - auction-network

  # ── Grafana (대시보드) ──────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: auction-grafana
    restart: always
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_SERVER_ROOT_URL:          https://your-domain.com/grafana
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    expose:
      - "3000"
    depends_on:
      - prometheus
    networks:
      - auction-network

volumes:
  postgres-data:
  redis-data:
  prometheus-data:
  grafana-data:

networks:
  auction-network:
    driver: bridge
