apiVersion: 1

# ── Grafana 대시보드 자동 프로비저닝 ─────────────────────────────────────────────
# /etc/grafana/provisioning/dashboards/ 하위 JSON 파일을 자동으로 등록한다.

providers:
  - name: 'BidBid Dashboards'
    orgId: 1
    folder: 'BidBid'
    type: file
    disableDeletion: false
    editable: true
    options:
      path: /etc/grafana/provisioning/dashboards
