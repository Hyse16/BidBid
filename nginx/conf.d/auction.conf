# ──────────────────────────────────────────────────────────────────────────────
# BidBid 서비스 Nginx 가상 호스트 설정
#
# 요청 라우팅:
#   /api/**        → backend:8080  (Spring Boot REST API)
#   /ws/**         → backend:8080  (WebSocket STOMP)
#   /actuator/**   → backend:8080  (헬스체크 / 메트릭, 내부망 접근 권장)
#   그 외          → frontend:3000 (Next.js)
#
# SSL:
#   - HTTP(80)  → HTTPS(443) 리다이렉트
#   - 인증서는 Certbot(Let's Encrypt)으로 발급
#   - 인증서 경로: /etc/letsencrypt/live/your-domain.com/
# ──────────────────────────────────────────────────────────────────────────────

# ── 업스트림 정의 ─────────────────────────────────────────────────────────────

upstream backend {
    server backend:8080;
    keepalive 32;
}

upstream frontend {
    server frontend:3000;
    keepalive 16;
}

# ── HTTP → HTTPS 리다이렉트 ───────────────────────────────────────────────────

server {
    listen 80;
    server_name your-domain.com www.your-domain.com;

    # Let's Encrypt ACME 챌린지 경로 (인증서 발급/갱신 시 필요)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # 그 외 모든 요청은 HTTPS로 리다이렉트
    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS 메인 서버 ──────────────────────────────────────────────────────────

server {
    listen 443 ssl http2;
    server_name your-domain.com www.your-domain.com;

    # SSL 인증서 (Let's Encrypt)
    ssl_certificate     /etc/letsencrypt/live/your-domain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/your-domain.com/privkey.pem;

    # SSL 보안 설정
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # HSTS (브라우저가 1년간 HTTPS만 사용)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ── REST API 라우팅 ───────────────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://backend;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # 타임아웃 설정 (파일 업로드 등 장시간 요청 고려)
        proxy_connect_timeout  10s;
        proxy_send_timeout     60s;
        proxy_read_timeout     60s;
    }

    # ── WebSocket (STOMP) 라우팅 ──────────────────────────────────────────────
    location /ws/ {
        proxy_pass         http://backend;
        proxy_http_version 1.1;

        # WebSocket 업그레이드 헤더 전달 (필수)
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;

        # WebSocket 연결 유지 시간 (실시간 경매 연결)
        proxy_read_timeout  3600s;
        proxy_send_timeout  3600s;
    }

    # ── Actuator (헬스체크 / Prometheus 메트릭) ───────────────────────────────
    location /actuator/ {
        proxy_pass       http://backend;
        proxy_set_header Host $host;

        # 운영 환경에서는 내부 IP만 허용 권장
        # allow 10.0.0.0/8;
        # deny  all;
    }

    # ── Next.js 프론트엔드 ─────────────────────────────────────────────────────
    location / {
        proxy_pass         http://frontend;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Next.js HMR (개발 환경에서만 사용, 프로덕션 불필요)
    # location /_next/webpack-hmr {
    #     proxy_pass         http://frontend;
    #     proxy_http_version 1.1;
    #     proxy_set_header   Upgrade    $http_upgrade;
    #     proxy_set_header   Connection "upgrade";
    # }
}
